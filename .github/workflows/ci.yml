name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-specs:
    name: Lint AIP frontmatter
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify every spec has required frontmatter
        run: |
          set -e
          fail=0
          for f in specs/aip-*.mdx; do
            # Required on every spec.
            for key in aip title status type created; do
              if ! grep -qE "^${key}:" "$f"; then
                echo "::error file=$f::missing frontmatter key '$key'"
                fail=1
              fi
            done
            # Authorship: either a single `author:` (own work), or both
            # `spec-author:` + `aip-editor:` (external spec adapted into AIP).
            if ! grep -qE "^author:" "$f"; then
              if ! { grep -qE "^spec-author:" "$f" && grep -qE "^aip-editor:" "$f"; }; then
                echo "::error file=$f::missing 'author' (or 'spec-author' + 'aip-editor' pair)"
                fail=1
              fi
            fi
          done
          exit $fail
