name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-specs:
    name: Lint AIP frontmatter
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify every spec has required frontmatter
        run: |
          set -e
          fail=0
          for f in specs/aip-*.mdx; do
            for key in aip title author status type created; do
              if ! grep -qE "^${key}:" "$f"; then
                echo "::error file=$f::missing frontmatter key '$key'"
                fail=1
              fi
            done
          done
          exit $fail
