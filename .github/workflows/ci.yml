name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so a fast-followup push doesn't
# pile up — important for spec PRs that get nudged repeatedly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Build + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      # `cache: pnpm` would speed up installs but requires a committed
      # pnpm-lock.yaml to compute its cache key. Skipping until we ship
      # a standalone lockfile.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # No committed lockfile yet — agentproto is also a workspace
      # member of the private agentik-studio monorepo where the
      # canonical lockfile lives. CI resolves from package.json
      # ranges; tighten to --frozen-lockfile after generating + committing
      # a standalone lockfile.
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type-check all packages
        run: pnpm -r --filter "./packages/**" --filter "./adapters/**" check-types

      - name: Build all packages
        run: pnpm -r --filter "./packages/**" --filter "./adapters/**" build

      - name: Run tests
        run: pnpm -r --filter "./packages/**" --filter "./adapters/**" test
